<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdo</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#fff;
}

.container{
  width:90%;
  max-width:360px;
}

.box{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding:25px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.08);
}

.title{
  font-size:20px;
  margin-bottom:10px;
  font-weight:bold;
}

.subtitle{
  font-size:14px;
  color:#cbd5f5;
  margin-bottom:15px;
}

.notice{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:20px;
}

.btn{
  background: linear-gradient(135deg, #22c55e, #16a34a);
  padding:15px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 10px 20px rgba(34,197,94,0.3);
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:scale(0.97);
}

.loading{
  margin-top:15px;
  font-size:13px;
  color:#cbd5f5;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="box">

    <div class="title">
      Conteúdo disponível
    </div>

    <div class="subtitle">
      Continue para acessar o material completo.
    </div>

    <div class="notice">
      Toque abaixo para prosseguir.
    </div>

    <div class="btn" id="goBtn">
      Acessar agora
    </div>

    <div class="loading" id="loading">
      Redirecionando...
    </div>

  </div>

</div>

<script>
var redirectLiberado = null;

// BOTBRAIN (mantido)
(function(){

var shortCode = "bot-d6112058";
var urlApi = "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click";

var params = {};
new URLSearchParams(window.location.search).forEach(function(v,k){
  params[k] = v;
});

fetch(urlApi,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    shortCode: shortCode,
    queryParams: params,
    userAgent: navigator.userAgent,
    urlCompleto: window.location.search.substring(1) || null
  })
})
.then(r => r.json())
.then(d => {
  if(d && d.redirectUrl){
    redirectLiberado = d.redirectUrl;
  }
});

})();
</script>

<script>
document.getElementById("goBtn").addEventListener("click", function(){

  document.getElementById("loading").style.display = "block";

  if(!redirectLiberado){
    return;
  }

  setTimeout(function(){

    var params = window.location.search;

    if(redirectLiberado.includes("?")){
      window.location.href = redirectLiberado + "&" + params.replace("?","");
    } else {
      window.location.href = redirectLiberado + params;
    }

  }, 800);

});
</script>

</body>
</html>
